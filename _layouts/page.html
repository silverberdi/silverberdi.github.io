---
layout: default
---

<!-- begin page -->
<div class="container">
  <div class="row">
    <div class="col col-12">
      <div class="page-head">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
        {% endif %}
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="row">
    <div class="col col-12">
      <div class="page">
        {{ content }}
      </div>
    </div>
  </div>
</div>
<!-- end page -->
